<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | TrueFit AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <div class="nav-logo">🎯 TrueFit AI</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-icon">✨</div>
        <h1>Create Account</h1>
        <p class="auth-sub">Join TrueFit AI and discover your perfect career</p>

        {% if error %}
        <div class="auth-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-submit" style="width:100%">🎯 Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>

<footer>
    <p>© 2025 TrueFit AI | Built with Python, Flask & Machine Learning</p>
</footer>

</body>
</html>
